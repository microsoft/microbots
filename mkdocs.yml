site_name: Microbots
site_url: https://microsoft.github.io/microbots
site_description: A lightweight, extensible AI agent for code comprehension and controlled file edits.
repo_url: https://github.com/microsoft/microbots
repo_name: microsoft/microbots

theme:
  name: zensical
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.top
    - navigation.tabs
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            heading_level: 2
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_labels: true
            show_if_no_docstring: true
            group_by_category: false
            filters:
              - "!^_"

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - attr_list

nav:
  - Getting Started:
    - Home: index.md
  - API Documentation:
    - Overview: api-docs/overview.md
    - Components:
      - api-docs/components/index.md
      - Bot: api-docs/components/bot.md
    - Bots:
      - api-docs/bots/index.md
      - LogAnalysisBot: api-docs/bots/log-analysis-bot.md
  - Guides:
    - CopilotBot: copilot-bot.md
    - Authentication: authentication.md
    - Tools:
      - "Custom Tool Integration Walkthrough": blog/guides/tesseract_ocr_tool_use.md
  - Blogs:
    - blog/index.md
    - "Microbots : Safety First Agentic Workflow": blog/microbots-safety-first-ai-agent.md

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/lightbox.js
