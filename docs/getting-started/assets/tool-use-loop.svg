<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-label="Microbots LOOP — agentic tool-use cycle" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <style>
    .ink      { fill: #1F2937; }
    .ink-soft { fill: #4B5563; }

    .title { font-size: 22px; font-weight: 700; }
    .sub   { font-size: 15px; }
    .icon  { font-size: 30px; }
    .label { font-size: 16px; font-weight: 600; }

    .box-llm  { fill: #7C3AED; fill-opacity: 0.18; stroke: #7C3AED; stroke-width: 2; }
    .box-exec { fill: #16A34A; fill-opacity: 0.18; stroke: #16A34A; stroke-width: 2; }
    .badge-bound { fill: #DC2626; fill-opacity: 0.18; stroke: #DC2626; stroke-width: 2; }
    .badge-exit  { fill: #F59E0B; fill-opacity: 0.18; stroke: #F59E0B; stroke-width: 2; }
    .label-bg    { fill: #FFFFFF; fill-opacity: 0.85; stroke: #9CA3AF; stroke-width: 1.2; }
    .spark-bg    { fill: #FFFFFF; fill-opacity: 0.85; stroke: #F59E0B; stroke-width: 2; }

    .edge { stroke: #6B7280; stroke-width: 4; fill: none; stroke-linecap: round; }

    @media (prefers-color-scheme: dark) {
      .ink      { fill: #F3F4F6; }
      .ink-soft { fill: #D1D5DB; }
      .edge     { stroke: #9CA3AF; }
      .label-bg { fill: #111827; fill-opacity: 0.85; stroke: #9CA3AF; }
      .spark-bg { fill: #1F2937; stroke: #F59E0B; }
      .box-llm, .box-exec, .badge-bound, .badge-exit { fill-opacity: 0.28; }
    }
  </style>

  <defs>
    <marker id="a" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="strokeWidth">
      <path d="M0,1 L11,6 L0,11 L2,6 z" fill="context-stroke"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="40" class="ink title">🔁 Agentic tool-use loop</text>
  <text x="40" y="66" class="ink-soft sub">runs until the model is done — or a bound is hit</text>

  <!-- LLM (top) -->
  <rect x="350" y="90" width="300" height="120" rx="14" class="box-llm"/>
  <text x="500" y="130" text-anchor="middle" class="ink icon">🧠</text>
  <text x="500" y="165" text-anchor="middle" class="ink title">LLM</text>
  <text x="500" y="190" text-anchor="middle" class="ink-soft sub">decides next tool call</text>

  <!-- Container exec (bottom) -->
  <rect x="350" y="290" width="300" height="120" rx="14" class="box-exec"/>
  <text x="500" y="330" text-anchor="middle" class="ink icon">📦</text>
  <text x="500" y="365" text-anchor="middle" class="ink title">Container exec</text>
  <text x="500" y="390" text-anchor="middle" class="ink-soft sub">ls • cat • nl • grep • …</text>

  <!-- Down arrow (LLM → exec) -->
  <path d="M440,214 C 380,235 380,265 440,286" class="edge" marker-end="url(#a)"/>
  <g>
    <rect x="245" y="232" width="170" height="34" rx="10" class="label-bg"/>
    <text x="330" y="255" text-anchor="middle" class="ink label">tool call (cmd)</text>
  </g>

  <!-- Up arrow (exec → LLM) -->
  <path d="M560,286 C 620,265 620,235 560,214" class="edge" marker-end="url(#a)"/>
  <g>
    <rect x="585" y="232" width="180" height="34" rx="10" class="label-bg"/>
    <text x="675" y="255" text-anchor="middle" class="ink label">stdout / stderr</text>
  </g>

  <!-- Loop spark badge in middle -->
  <circle cx="500" cy="250" r="28" class="spark-bg"/>
  <text x="500" y="262" text-anchor="middle" class="ink icon" font-size="26">⚡</text>

  <!-- Exit arrow → right -->
  <path d="M650,150 L820,150" class="edge" marker-end="url(#a)"/>
  <g>
    <rect x="660" y="108" width="220" height="36" rx="10" class="badge-exit"/>
    <text x="770" y="132" text-anchor="middle" class="ink label">task_done = true → exit</text>
  </g>

  <!-- Bound badges -->
  <g>
    <rect x="820" y="200" width="160" height="40" rx="12" class="badge-bound"/>
    <text x="900" y="226" text-anchor="middle" class="ink label">⏱ timeout cap</text>
  </g>
  <g>
    <rect x="820" y="252" width="160" height="40" rx="12" class="badge-bound"/>
    <text x="900" y="278" text-anchor="middle" class="ink label">🔁 max iterations</text>
  </g>
</svg>
