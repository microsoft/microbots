<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <rect width="600" height="340" fill="#010409"/>
  <rect x="1" y="1" width="598" height="338" fill="none" stroke="#3d444d" stroke-width="1"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">How Mounts Work</text>

  <!-- ===== Primary Mount (folder_to_mount) ===== -->
  <text x="300" y="58" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e">PRIMARY MOUNT</text>
  <text x="300" y="72" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#6e7681">folder_to_mount — must be MountType.MOUNT</text>

  <!-- READ_ONLY: Overlay -->
  <rect x="40" y="85" width="250" height="75" rx="6" fill="#0d1117" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="165" y="105" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" font-weight="600" fill="#d2a8ff">READ_ONLY</text>
  <text x="165" y="122" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#6e7681">Mounted ro → OverlayFS on top</text>
  <text x="165" y="137" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#6e7681">Writes go to a disposable upper layer</text>
  <text x="165" y="152" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="600" fill="#d2a8ff">Discarded on container exit</text>

  <!-- READ_WRITE: Direct bind -->
  <rect x="310" y="85" width="250" height="75" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="435" y="105" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" font-weight="600" fill="#3fb950">READ_WRITE</text>
  <text x="435" y="122" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#6e7681">Direct bind mount with rw</text>
  <text x="435" y="137" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#6e7681">Writes persist to the mounted folder</text>
  <text x="435" y="152" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="600" fill="#3fb950">Scoped to that folder only</text>

  <!-- Divider -->
  <line x1="40" y1="180" x2="560" y2="180" stroke="#3d444d" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- ===== Additional Mounts ===== -->
  <text x="300" y="205" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e">ADDITIONAL MOUNTS</text>
  <text x="300" y="219" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#6e7681">additional_mounts — must be MountType.COPY</text>

  <!-- COPY box -->
  <rect x="120" y="232" width="360" height="75" rx="6" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="300" y="255" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" font-weight="600" fill="#f0883e">COPY</text>
  <text x="300" y="272" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#6e7681">Files copied into container via docker cp</text>
  <text x="300" y="287" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#6e7681">Bot works on a snapshot — permission applied inside container</text>
  <text x="300" y="302" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="600" fill="#f0883e">Originals never modified</text>

  <!-- Bottom note -->
  <text x="300" y="328" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#484f58">Security for READ_WRITE: Docker isolation + explicit path scoping — only mounted folders are accessible</text>
</svg>
